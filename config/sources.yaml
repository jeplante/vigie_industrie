    language: en
    enabled: true
    timeoutSeconds: 20
    attempts: 3
    expectedMetrics: [core_eps, core_earnings, licat_ratio, total_client_assets]
    fetchPolicy: etag_last_modified_then_hash
  - id: iag-results
