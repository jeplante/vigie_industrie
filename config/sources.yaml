    priority: primary
    language: en
    enabled: true
    timeoutSeconds: 20
    attempts: 3
    expectedMetrics: [core_eps, net_income, licat_ratio, assets_under_management]
    fetchPolicy: etag_last_modified_then_hash
  - id: gwo-results
    companyId: GWO
