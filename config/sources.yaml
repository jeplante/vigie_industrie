sources:
  - id: mfc-results
    companyId: MFC
    type: html_release_index
    url: https://www.manulife.com/ca/en/about-us/investors/results-and-reports
    adapter: manulife
    priority: primary
    language: fr
    enabled: true
    timeoutSeconds: 20
    attempts: 3
    expectedMetrics: [core_eps, core_earnings, net_income, licat_ratio]
    fetchPolicy: etag_last_modified_then_hash
  - id: slf-results
    companyId: SLF
    type: html_release_index
