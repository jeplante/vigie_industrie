name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        run: python -m pip install -e "./pipeline[dev]"

      - name: Ruff
        working-directory: pipeline
        run: ruff check . && ruff format --check .

      - name: Mypy
        working-directory: pipeline
        run: mypy src

      - name: Pytest
        working-directory: pipeline
        run: pytest

      - name: Validate published JSON
        working-directory: pipeline
        run: python -m vigie_pipeline validate

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend
        working-directory: app
        run: npm ci

      - name: ESLint
        working-directory: app
        run: npm run lint

      - name: TypeScript
        working-directory: app
        run: npm run typecheck

      - name: Vitest
        working-directory: app
        run: npm run test

      - name: Vite build
        working-directory: app
        run: npm run build
