name: Deploy GitHub Pages

on:
  workflow_call:
    inputs:
      ref:
        description: Commit ou branche à déployer
        required: false
        type: string
        default: ""
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "data/published/**"
      - "pipeline/**"
      - "config/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, 'chore(data): refresh industry watch data')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install validation pipeline
        run: python -m pip install -e ./pipeline

      - name: Validate last-known-good and sync frontend data
        working-directory: pipeline
        run: python -m vigie_pipeline sync-frontend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend
        working-directory: app
        run: npm ci

      - name: Test frontend
        working-directory: app
        run: npm run lint && npm run typecheck && npm run test

      - name: Build Vite
        working-directory: app
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

