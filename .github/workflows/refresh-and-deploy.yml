name: Refresh and deploy

on:
  workflow_dispatch:
    inputs:
      company:
        description: Compagnie seulement (laisser vide pour toutes)
        required: false
        type: choice
        options: ["", MFC, SLF, GWO, IAG]
  schedule:
    - cron: "17 10 * * *"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "pipeline/**"
      - "config/**"
      - "data/**"
      - "schemas/**"
      - ".github/workflows/refresh-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    if: >-
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, 'chore(data): refresh industry watch data')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        run: python -m pip install -e "./pipeline[dev]"

      - name: Refresh all companies
        if: github.event_name != 'workflow_dispatch' || inputs.company == ''
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_STANDARD_MODEL: ${{ vars.ANTHROPIC_STANDARD_MODEL }}
          ANTHROPIC_COMPLEX_MODEL: ${{ vars.ANTHROPIC_COMPLEX_MODEL }}
        run: python -m vigie_pipeline refresh

      - name: Refresh selected company
        if: github.event_name == 'workflow_dispatch' && inputs.company != ''
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_STANDARD_MODEL: ${{ vars.ANTHROPIC_STANDARD_MODEL }}
          ANTHROPIC_COMPLEX_MODEL: ${{ vars.ANTHROPIC_COMPLEX_MODEL }}
        run: python -m vigie_pipeline refresh --company "${{ inputs.company }}"

      - name: Validate refreshed data
        working-directory: pipeline
        run: python -m vigie_pipeline validate

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install and test frontend
        working-directory: app
        run: npm ci && npm run test && npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit changed published data
        run: |
          if git diff --quiet -- data/published app/public/data; then
            echo "Aucune donnée modifiée." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published app/public/data
          git commit -m "chore(data): refresh industry watch data"
          git push

      - name: Workflow summary
        if: always()
        run: |
          echo "## Vigie de l’industrie" >> "$GITHUB_STEP_SUMMARY"
          echo "- Déclencheur: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- UTC: $(date -u +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/published/quality-report.json ]; then
            echo '- Rapport: `data/published/quality-report.json`' >> "$GITHUB_STEP_SUMMARY"
          fi
