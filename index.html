<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille assurance de personnes — Canada</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface-2: #F0EFEC;
    --border: #E2E0DB;
    --border-light: #ECEAE6;
    --text-primary: #1A1A18;
    --text-secondary: #5C5B57;
    --text-tertiary: #9B9A95;
    --green: #1A7A56;
    --green-bg: #EAF4EF;
    --red: #B83D1E;
    --red-bg: #FAEDE9;
    --accent: #1A4D8F;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .header-left {}
  .header-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-secondary);
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .export-btn:hover { background: var(--surface-2); color: var(--text-primary); border-color: #ccc; }

  /* Nav tabs */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
  }
  .nav-tab {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main content */
  .main { padding: 32px 40px; max-width: 1200px; }

  /* Company header */
  .company-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
  }
  .company-name { font-size: 20px; font-weight: 600; color: var(--text-primary); }
  .company-ticker {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 14px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .period-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--surface-2);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-light);
  }

  /* Metric grid */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  @media (max-width: 900px) { .metric-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .metric-grid { grid-template-columns: 1fr; } }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }
  .metric-card-label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .metric-card-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
  }
  .metric-card-ref {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
  }
  .metric-delta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 2px;
  }
  .delta-up { color: var(--green); background: var(--green-bg); }
  .delta-down { color: var(--red); background: var(--red-bg); }
  .delta-neu { color: var(--text-tertiary); background: var(--surface-2); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border-light); margin: 0 0 24px; }

  /* News cards */
  .news-grid { display: flex; flex-direction: column; gap: 12px; }
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0 20px;
    align-items: start;
  }
  .news-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    padding-top: 2px;
    line-height: 1.4;
  }
  .news-content {}
  .news-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4; }
  .news-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--border-light);
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .header { padding: 16px 20px; }
    .nav { padding: 0 20px; }
    .main { padding: 20px; }
    .news-card { grid-template-columns: 1fr; }
    .news-date { margin-bottom: 6px; }
    .header-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <p class="header-eyebrow">Veille industrie · Généré par IA</p>
    <p class="header-title">Assurance de personnes — Canada</p>
    <p class="header-sub">Données réelles · Résultats annuels 2025 publiés fév. 2026 · Toutes les valeurs en CA$</p>
  </div>
  <button class="export-btn" onclick="exportCSV()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Exporter CSV
  </button>
</div>

<nav class="nav">
  <div class="nav-tab active" onclick="show(0)">Manuvie</div>
  <div class="nav-tab" onclick="show(1)">Sun Life</div>
  <div class="nav-tab" onclick="show(2)">Great-West Lifeco</div>
  <div class="nav-tab" onclick="show(3)">iA Groupe financier</div>
</nav>

<div class="main">
  <div id="panel"></div>
</div>

<script>
const DATA = [
  {
    name:"Manuvie", ticker:"MFC.TO", quarter:"2025 annuel", year_ref:"2024",
    metrics:[
      {label:"Bénéfices de base", value:"7,5 G$", ref:"~7,3 G$", delta:"+3%", dir:"up"},
      {label:"BPA de base", value:"4,21 $", ref:"3,90 $", delta:"+8%", dir:"up"},
      {label:"Ventes APE (assurance)", value:"2,82 G$", ref:"2,64 G$ (T1 2024)", delta:"+7%", dir:"up"},
      {label:"Rendement sur capital (ROE)", value:"16,5 %", ref:"~15,8 %", delta:"+70 pb", dir:"up"}
    ],
    news:[
      {date:"Fév. 2026", title:"Résultats records 2025 — bénéfices de base à 7,5 G$", body:"Manuvie a affiché des résultats records pour 2025, avec des bénéfices de base en hausse de 3 % sur une base de taux de change constant. Le dividende a été relevé de 10,2 % et un rachat d'actions couvrant ~2,5 % des actions en circulation a été annoncé."},
      {date:"Fév. 2026", title:"Acquisition de Comvest Credit Partners (75 %) — 17,5 G$ d'actifs", body:"Dans le cadre de sa stratégie Global WAM, Manuvie a acquis 75 % de Comvest Credit Partners, un gestionnaire de crédit privé américain avec 17,5 G$ d'actifs sous gestion, renforçant ses capacités en crédit privé."},
      {date:"Mai 2026", title:"T1 2026 — croissance du BPA de base à deux chiffres", body:"Au premier trimestre 2026, les ventes APE ont progressé de 7 % à 2,82 G$, avec une nouvelle valeur d'affaires (NBV) en hausse de 7 % à 944 M$. Global WAM a toutefois enregistré des sorties nettes de 4,4 G$."}
    ]
  },
  {
    name:"Sun Life", ticker:"SLF.TO", quarter:"2025 annuel", year_ref:"2024",
    metrics:[
      {label:"Revenu net sous-jacent (T4)", value:"1 094 M$", ref:"965 M$", delta:"+13%", dir:"up"},
      {label:"Actifs sous gestion (AUM)", value:"1 605 G$", ref:"1 543 G$", delta:"+4%", dir:"up"},
      {label:"CSM total", value:"14,5 G$", ref:"13,4 G$", delta:"+8%", dir:"up"},
      {label:"Plateforme épargne Canada (AUMA)", value:"277 G$", ref:"~245 G$", delta:"+13%", dir:"up"}
    ],
    news:[
      {date:"Fév. 2026", title:"Résultats T4 et annuels 2025 — revenu sous-jacent T4 en hausse de 13 %", body:"Sun Life a publié des résultats solides pour le T4 2025, portés par une amélioration de l'expérience de crédit, des revenus de frais plus élevés en gestion d'actifs, et la croissance des affaires individuelles au Canada et en Asie."},
      {date:"Fév. 2026", title:"Restructuration — création de Sun Life Asset Management", body:"Effective au 1er janvier 2026, Sun Life a formalisé son pilier de gestion d'actifs sous l'appellation Sun Life Asset Management, regroupant MFS, SLC Management et ses participations asiatiques (Aditya Birla)."},
      {date:"Nov. 2025", title:"Position de leader en assurance individuelle au Canada — T3 2025", body:"Sun Life a maintenu sa position de leader en assurance individuelle au Canada, avec une croissance de 31 % en maladies graves (assurance critique) au T3 2025. La transformation numérique de la souscription se poursuit activement."}
    ]
  },
  {
    name:"Great-West Lifeco", ticker:"GWO.TO", quarter:"2025 annuel", year_ref:"2024",
    metrics:[
      {label:"Bénéfices de base (annuels)", value:"4,65 G$", ref:"4,19 G$", delta:"+11%", dir:"up"},
      {label:"BPA de base", value:"5,03 $", ref:"4,49 $", delta:"+12%", dir:"up"},
      {label:"Actifs sous admin. (AUA)", value:"3,6 T$", ref:"3,3 T$", delta:"+9%", dir:"up"},
      {label:"ROE de base", value:"18,2 %", ref:"17,5 %", delta:"+70 pb", dir:"up"}
    ],
    news:[
      {date:"Fév. 2026", title:"Résultats records 2025 — bénéfices de base +11 %, dividende +10 %", body:"Great-West Lifeco a enregistré des bénéfices de base records en 2025, portés par Empower (retraite US), Capital & Risk Solutions, et les opérations canadiennes. La compagnie a racheté 28 M d'actions (>1,6 G$) et dispose encore de 2,1 G$ de liquidités au holding."},
      {date:"Fév. 2026", title:"Canada T4 — bénéfices de base +10 % à 400 M$", body:"Le segment canadien a affiché des bénéfices de base de 400 M$ au T4 2025, en hausse de 10 % grâce à une expérience favorable en assurances collectives et assurance individuelle, ainsi qu'à des revenus de frais plus élevés."},
      {date:"Fév. 2026", title:"Journée investisseurs 2026 — cible de croissance BPA de 8-10 % et ROE >19 %", body:"Lors de sa journée investisseurs, Great-West Lifeco a ciblé une croissance du BPA de 8-10 %, un ROE >19 %, et une génération de capital >80 %, en misant sur la croissance organique sans dépendance aux acquisitions."}
    ]
  },
  {
    name:"iA Groupe financier", ticker:"IAG.TO", quarter:"2025 annuel", year_ref:"2024",
    metrics:[
      {label:"BPA de base (annuel)", value:"12,96 $", ref:"11,17 $", delta:"+16%", dir:"up"},
      {label:"Bénéfices de base (annuels)", value:"1,21 G$", ref:"1,07 G$", delta:"+13%", dir:"up"},
      {label:"BPA de base (T4)", value:"3,10 $", ref:"3,04 $", delta:"+2%", dir:"up"},
      {label:"ROE de base (12 mois)", value:"17,1 %", ref:"~15,5 %", delta:"+160 pb", dir:"up"}
    ],
    news:[
      {date:"Fév. 2026", title:"Résultats T4 et annuels 2025 — cible ROE 17 % atteinte 2 ans en avance", body:"iA Groupe financier a dépassé sa cible de ROE de base de 17 % en 2025, deux ans avant l'échéance prévue de 2027. Les bénéfices de base annuels ont progressé de 13 % à 1,21 G$, portés par la gestion de patrimoine et les opérations canadiennes."},
      {date:"Fév. 2026", title:"Acquisition de RF Capital Group — capital déployé activement", body:"iA a finalisé l'acquisition de RF Capital Group et procédé à des rachats d'actions, réduisant le capital disponible au déploiement à 1,4 G$ (contre 1,7 G$ au T3 2025). La cible de génération de capital organique est relevée à 700 M$+ pour 2026."},
      {date:"Mai 2026", title:"T1 2026 — ventes assurance individuelle US en hausse de 16 %", body:"Au premier trimestre 2026, les ventes d'assurance individuelle aux États-Unis ont atteint 79 M$ US, en hausse de 16 % vs 2025. Le titre a toutefois subi une correction de ~10 % après la publication des résultats avant de se redresser."}
    ]
  }
];

let current = 0;

function show(idx) {
  current = idx;
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  render();
}

function render() {
  const d = DATA[current];
  document.getElementById('panel').innerHTML = `
    <div class="company-header">
      <span class="company-name">${d.name}</span>
      <span class="company-ticker">${d.ticker}</span>
    </div>

    <div class="section-header">
      <p class="section-label" style="margin:0">Métriques financières clés</p>
      <span class="period-badge">${d.quarter} vs ${d.year_ref}</span>
    </div>

    <div class="metric-grid">
      ${d.metrics.map(m => `
        <div class="metric-card">
          <p class="metric-card-label">${m.label}</p>
          <p class="metric-card-value">${m.value}</p>
          <p class="metric-card-ref">Réf. ${d.year_ref} : ${m.ref}</p>
          <span class="metric-delta ${m.dir==='up'?'delta-up':m.dir==='down'?'delta-down':'delta-neu'}">
            ${m.dir==='up'?'▲':m.dir==='down'?'▼':'—'} ${m.delta}
          </span>
        </div>
      `).join('')}
    </div>

    <hr class="divider">

    <p class="section-label">Investor relations — actualités récentes</p>
    <div class="news-grid">
      ${d.news.map(n => `
        <div class="news-card">
          <p class="news-date">${n.date}</p>
          <div class="news-content">
            <p class="news-title">${n.title}</p>
            <p class="news-body">${n.body}</p>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="footer">
      Sources : communiqués de presse IR officiels · Manuvie (fév. 2026) · Sun Life (fév. 2026) · Great-West Lifeco (fév. 2026) · iA Groupe financier (fév. 2026) · Toutes les valeurs en CA$
    </div>
  `;
}

function exportCSV() {
  const rows = [["Compagnie","Ticker","Période","Référence","Métrique","Valeur","Réf. année préc.","Delta"]];
  DATA.forEach(d => {
    d.metrics.forEach(m => {
      rows.push([d.name, d.ticker, d.quarter, d.year_ref, m.label, m.value, m.ref, m.delta]);
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "veille_assurance_canada_2025.csv";
  a.click();
}

render();
</script>
</body>
</html>
